<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Freelance ClientHub{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 fixed h-full">
            <div class="p-6 border-b border-gray-200">
                <h1 class="text-xl font-semibold text-gray-900">ClientHub</h1>
            </div>
            <nav class="p-4 space-y-1">
                <a href="/dashboard" class="block px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100 transition-colors">
                    Dashboard
                </a>
                <a href="/clients" class="block px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100 transition-colors">
                    Clients
                </a>
                <a href="/projects" class="block px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100 transition-colors">
                    Projects
                </a>
                <a href="/time" class="block px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100 transition-colors">
                    Time Tracking
                </a>
                <a href="/invoices" class="block px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100 transition-colors">
                    Invoices
                </a>
            </nav>
        </aside>

        <div class="flex-1 ml-64">
            <header class="bg-white border-b border-gray-200 px-6 py-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-semibold text-gray-900">{% block page_title %}Dashboard{% endblock %}</h2>
                    <div class="flex items-center space-x-4">
                        <div class="w-8 h-8 bg-gray-300 rounded-full"></div>
                    </div>
                </div>
            </header>

            <main class="p-6">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
