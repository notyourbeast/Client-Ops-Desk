<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Freelance ClientHub{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media (max-width: 768px) {
            .sidebar-open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-6 border-b border-gray-200">
                <h1 class="text-xl font-semibold text-gray-900">ClientHub</h1>
            </div>
            <nav class="p-4 space-y-1">
                {% set current_path = request.path %}
                <a href="/dashboard" class="block px-3 py-2.5 rounded-md text-sm font-medium {% if current_path == '/dashboard' %}bg-gray-100 text-gray-900{% else %}text-gray-700 hover:bg-gray-100 hover:text-gray-900{% endif %} focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-colors">
                    Dashboard
                </a>
                <a href="/clients" class="block px-3 py-2.5 rounded-md text-sm font-medium {% if current_path.startswith('/clients') %}bg-gray-100 text-gray-900{% else %}text-gray-700 hover:bg-gray-100 hover:text-gray-900{% endif %} focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-colors">
                    Clients
                </a>
                <a href="/projects" class="block px-3 py-2.5 rounded-md text-sm font-medium {% if current_path.startswith('/projects') %}bg-gray-100 text-gray-900{% else %}text-gray-700 hover:bg-gray-100 hover:text-gray-900{% endif %} focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-colors">
                    Projects
                </a>
                <a href="/invoices" class="block px-3 py-2.5 rounded-md text-sm font-medium {% if current_path.startswith('/invoices') %}bg-gray-100 text-gray-900{% else %}text-gray-700 hover:bg-gray-100 hover:text-gray-900{% endif %} focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-colors">
                    Invoices
                </a>
                <a href="/time" class="block px-3 py-2.5 rounded-md text-sm font-medium {% if current_path.startswith('/time') %}bg-gray-100 text-gray-900{% else %}text-gray-700 hover:bg-gray-100 hover:text-gray-900{% endif %} focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-colors">
                    Time Tracking
                </a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col lg:ml-0 min-w-0">
            <header class="bg-white border-b border-gray-200 px-4 sm:px-6 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="menu-toggle" class="lg:hidden p-2 rounded-md text-gray-600 hover:bg-gray-100 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <h2 class="text-xl sm:text-2xl font-semibold text-gray-900">{% block page_title %}Dashboard{% endblock %}</h2>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="hidden md:block relative">
                            <div class="relative">
                                <input type="text" 
                                       id="global-search-input" 
                                       placeholder="Search clients, projects, invoices..." 
                                       class="w-64 pl-10 pr-4 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-colors bg-white text-gray-900 placeholder-gray-400">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="relative">
                            <button id="user-menu-button" class="flex items-center gap-2 p-1 rounded-full hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 transition-colors">
                                <div class="w-8 h-8 bg-gray-300 rounded-full"></div>
                            </button>
                            <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg border border-gray-200 py-1 z-50">
                                <form method="POST" action="{{ url_for('auth.logout') }}" class="block">
                                    <button type="submit" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 transition-colors">
                                        Sign out
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 sm:p-6">
                {% block content %}{% endblock %}
            </main>
        </div>

        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden hidden"></div>
    </div>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        menuToggle?.addEventListener('click', toggleSidebar);
        overlay?.addEventListener('click', toggleSidebar);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !overlay.classList.contains('hidden')) {
                toggleSidebar();
            }
        });

        const userMenuButton = document.getElementById('user-menu-button');
        const userMenu = document.getElementById('user-menu');

        userMenuButton?.addEventListener('click', (e) => {
            e.stopPropagation();
            userMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', (e) => {
            if (userMenu && !userMenu.contains(e.target) && !userMenuButton.contains(e.target)) {
                userMenu.classList.add('hidden');
            }
        });

        const globalSearchInput = document.getElementById('global-search-input');
        if (globalSearchInput) {
            globalSearchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const query = globalSearchInput.value.trim();
                    if (query) {
                        window.location.href = `/search?q=${encodeURIComponent(query)}`;
                    }
                }
            });
        }
    </script>
</body>
</html>
